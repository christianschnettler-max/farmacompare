name: Construir instalador Windows (.exe)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar dependencias del backend
        working-directory: backend
        run: npm install

      - name: Instalar dependencias del frontend
        working-directory: frontend
        run: npm install

      - name: Compilar frontend
        working-directory: frontend
        run: npm run build

      - name: Encontrar carpeta electron
        id: efolder
        shell: pwsh
        run: |
          $f = (Get-ChildItem -Directory | Where-Object { $_.Name -match "electr" } | Select-Object -First 1).Name
          echo "name=$f" >> $env:GITHUB_OUTPUT
          echo "Carpeta encontrada: $f"

      - name: Instalar dependencias Electron
        working-directory: ${{ steps.efolder.outputs.name }}
        run: npm install --include=dev
        env:
          NODE_ENV: development
          ELECTRON_SKIP_BINARY_DOWNLOAD: "1"

      - name: Construir instalador .exe
        working-directory: ${{ steps.efolder.outputs.name }}
        run: npx electron-builder --win --publish never
        env:
          NODE_ENV: development

      - name: Subir instalador
        uses: actions/upload-artifact@v4
        with:
          name: FarmaCompare-Windows-Installer
          path: |
            electrón/dist-electron/*.exe
            electron/dist-electron/*.exe
          if-no-files-found: warn
          retention-days: 30
